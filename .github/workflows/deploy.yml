name: Deploy to production (Vercel)

# Auto-deploys the site to the `dxd-design-orgchart` Vercel project on every push to
# main. The project's native Vercel↔GitHub connection isn't available on this Vercel
# account (the GitHub app can't reach this repo), so we deploy via the Vercel CLI + a
# token instead — this is the automated equivalent of running `vercel --prod`.
#
# ONE-TIME SETUP — add a repository secret named VERCEL_TOKEN:
#   1. Create a token at https://vercel.com/account/tokens
#      (scope it to the "wondopamine's projects" team).
#   2. GitHub repo → Settings → Secrets and variables → Actions →
#      New repository secret → name: VERCEL_TOKEN, value: <the token>.
# The org/project IDs below are identifiers (not secrets); they target the correct
# Vercel project and are safe to keep in the repo.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_oslXjSM8R42T7uSdUXiEVJxF
  VERCEL_PROJECT_ID: prj_AtkbI1eqhwOCdaTCMlGwJww7Qm45

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings + env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Build (bakes in MANAGER_PASSWORD from pulled env)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
